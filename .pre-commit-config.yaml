repos:
  # Backend Python hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements

  # Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        files: ^backend/
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        files: ^backend/
        additional_dependencies: [types-requests, types-redis, django-stubs]
        args: [--ignore-missing-imports]

  # Frontend hooks
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: docker-compose exec -T frontend npm run lint
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: frontend-type-check
        name: Frontend TypeScript Check
        entry: docker-compose exec -T frontend npm run type-check
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

  # Django specific
  - repo: local
    hooks:
      - id: django-check
        name: Django Check
        entry: docker-compose exec -T backend python manage.py check
        language: system
        files: ^backend/
        pass_filenames: false

      - id: django-migrations
        name: Check for Django migrations
        entry: docker-compose exec -T backend python manage.py makemigrations --check --dry-run
        language: system
        files: ^backend/.*models\.py$
        pass_filenames: false

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-r", "backend/", "-x", "backend/tests/"]
        files: ^backend/

  # Documentation
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-use-type-annotations
        files: ^backend/

exclude: |
  (?x)^(
      .*migrations/.*|
      .*node_modules/.*|
      .*\.min\.js|
      .*\.min\.css
  )$