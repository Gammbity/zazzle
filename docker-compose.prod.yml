# Production Docker Compose configuration for Zazzle platform

version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - zazzle_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env.prod
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - zazzle_network
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=zazzle.settings
    env_file:
      - .env.prod
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    networks:
      - zazzle_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    command: celery -A zazzle worker --loglevel=info --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=zazzle.settings
    env_file:
      - .env.prod
    volumes:
      - media_files:/app/media
    networks:
      - zazzle_network
    depends_on:
      - backend
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "celery -A zazzle inspect ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    command: celery -A zazzle beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=zazzle.settings
    env_file:
      - .env.prod
    volumes:
      - celery_beat_data:/app/celery-beat
    networks:
      - zazzle_network
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      - NODE_ENV=production
    env_file:
      - .env.prod
    networks:
      - zazzle_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    networks:
      - zazzle_network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  celery_beat_data:
    driver: local

networks:
  zazzle_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
